  <div id="swipeBackHint" class="swipe-back-hint">← Kembali</div>
  <div id="modal" class="modal-wrap"></div>
  <main id="page" class="page">
    <div class="card" style="margin-top:14px">

  <button id="absenFab" class="absen-fab" onclick="clockIn()" aria-label="Absen sekarang"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7.5 7.8a6.2 6.2 0 0 1 9 0"/><path d="M5.3 10.4a9 9 0 0 1 13.4 0"/><path d="M8.8 10.7a4.4 4.4 0 0 1 6.4 0"/><path d="M12 12.3c1.1 0 2 .9 2 2 0 2.7-1.1 4.9-2.8 6.5"/><path d="M10 14.3c0 1.8-.5 3.4-1.5 4.8"/><path d="M16.2 14.5c0 2-.4 3.9-1.3 5.5"/><path d="M12 4.2c-2.8 0-5.3 1.1-7.1 2.9"/><path d="M19.1 7.1A10 10 0 0 0 12 4.2"/></svg><span>Absen</span></button>
  <button id="fab" class="fab" onclick="openTx()">+</button>
  <nav id="nav" class="nav">
    <button id="nav-home" onclick="go('home')" aria-label="Beranda"><svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg><span>Home</span></button>
    <button id="nav-history" onclick="go('history')" aria-label="Riwayat"><svg viewBox="0 0 24 24"><path d="M7 3h10a2 2 0 0 1 2 2v16l-3-2-2 2-2-2-2 2-2-2-3 2V5a2 2 0 0 1 2-2Z"/><path d="M9 8h6"/><path d="M9 12h6"/><path d="M9 16h4"/></svg><span>Trx</span></button>
