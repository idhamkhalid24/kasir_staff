<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aplikasi Tidak Bisa Digunakan</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 22px;
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
    }

    .icon {
      width: 78px;
      height: 78px;
      margin: 0 auto 18px;
      border-radius: 50%;
      background: #ef4444;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: bold;
      box-shadow: 0 10px 25px rgba(239, 68, 68, 0.45);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: #e5e7eb;
      margin-bottom: 18px;
    }

    .phone {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 18px;
      font-size: 16px;
      font-weight: bold;
      color: #ffffff;
    }

    .btn {
      display: block;
      width: 100%;
      text-decoration: none;
      padding: 14px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: bold;
      margin-top: 10px;
      transition: 0.2s;
    }

    .btn-wa {
      background: #22c55e;
      color: #fff;
    }

    .btn-download {
      background: #3b82f6;
      color: #fff;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.92;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">!</div>

    <h1>Aplikasi Ini Sudah Tidak Bisa Digunakan</h1>

    <p>
      Silakan hubungi admin untuk informasi lebih lanjut,
      atau download aplikasi terbaru melalui link di bawah ini.
    </p>

    <div class="phone">
      Admin: +6285172107731
    </div>

    <a
      class="btn btn-wa"
      href="https://wa.me/6285172107731?text=Halo%20admin,%20aplikasi%20saya%20sudah%20tidak%20bisa%20digunakan"
      target="_blank">
      Hubungi Admin via WhatsApp
    </a>

    <a
      class="btn btn-download"
      href="https://github.com/idhamkhalid24/Toko_Rocky_Apk/releases/download/v1.0.0/trx_V2.apk"
      target="_blank">
      Download Aplikasi Terbaru
    </a>

    <div class="footer">
      Mohon gunakan aplikasi versi terbaru.
    </div>
  </div>

</body>
</html>
