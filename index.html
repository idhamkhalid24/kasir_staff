<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#3b6ef0" />
  <title>Rocky Hijab Staff Ringan - Sesuai Index</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <style>
    /* ===== RESET & ROOT ===== */
    :root{
      --safe:env(safe-area-inset-bottom,0px);
      --app-vvh:100dvh;
      --app-vvtop:0px;
    }

    /* ===== LIGHT THEME ===== */
    [data-theme="light"]{
      --bg:#f5f7fc;
      --bg2:#edf0f8;
      --card:#ffffff;
      --card2:#f8f9fd;
      --text:#1b2437;
      --text2:#2e3c52;
      --muted:#8494aa;
      --line:#e4e9f2;
      --line2:#d0d9ea;
      --blue:#3b6ef0;
      --blue-d:#2a5adc;
      --blue-light:#eef2fe;
      --blue-mid:#c5d3fb;
      --green:#16a34a;
      --green-light:#ecfdf5;
      --green-mid:#a7f3d0;
      --red:#dc2626;
      --red-light:#fef2f2;
      --red-mid:#fecaca;
      --amber:#b45309;
      --amber-light:#fffbeb;
      --amber-mid:#fde68a;
      --soft:#f0f3fa;
      --nav:#ffffff;
      --hero1:#2356cc;
      --hero2:#4a9cf5;
      --shadow:0 1px 4px rgba(20,40,80,.06),0 4px 16px rgba(20,40,80,.06);
      --shadow-md:0 2px 8px rgba(20,40,80,.08),0 8px 28px rgba(20,40,80,.09);
      --shadow-lg:0 8px 24px rgba(20,40,80,.12),0 24px 56px rgba(20,40,80,.12);
      --radius-sm:12px;
      --radius:16px;
      --radius-lg:20px;
      --radius-xl:24px;
    }

    /* ===== DARK THEME ===== */
    [data-theme="dark"]{
      --bg:#0f1623;
      --bg2:#141d2e;
      --card:#1a2438;
      --card2:#1e293b;
      --text:#e2e8f5;
      --text2:#c4cfdf;
      --muted:#6e82a0;
      --line:#263348;
      --line2:#1e2d42;
      --blue:#5b8cf5;
      --blue-d:#4a7ae8;
      --blue-light:rgba(91,140,245,.13);
      --blue-mid:rgba(91,140,245,.28);
      --green:#34d399;
      --green-light:rgba(52,211,153,.12);
      --green-mid:rgba(52,211,153,.28);
      --red:#f87171;
      --red-light:rgba(248,113,113,.12);
      --red-mid:rgba(248,113,113,.28);
      --amber:#fbbf24;
      --amber-light:rgba(251,191,36,.11);
      --amber-mid:rgba(251,191,36,.28);
      --soft:#131c2e;
      --nav:#1a2438;
      --hero1:#1e45c0;
      --hero2:#3488d8;
      --shadow:0 2px 8px rgba(0,0,0,.3),0 6px 24px rgba(0,0,0,.24);
      --shadow-md:0 4px 16px rgba(0,0,0,.38),0 10px 36px rgba(0,0,0,.28);
      --shadow-lg:0 8px 32px rgba(0,0,0,.48),0 20px 60px rgba(0,0,0,.38);
      --radius-sm:12px;
      --radius:16px;
      --radius-lg:20px;
      --radius-xl:24px;
    }

    /* ===== BASE ===== */
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{
      background:var(--bg);
      color:var(--text);
      font-family:'Plus Jakarta Sans',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
      font-size:14px;
      line-height:1.55;
      -webkit-font-smoothing:antialiased;
      width:100%;max-width:100%;overflow-x:hidden;
    }
    button,input,textarea,select{font:inherit}
    button{border:0;cursor:pointer}

    /* ===== INPUTS ===== */
    input,textarea{
      width:100%;
      min-height:46px;
      border:1.5px solid var(--line);
      border-radius:var(--radius-sm);
      background:var(--card2);
      color:var(--text);
      padding:11px 14px;
      outline:none;
      transition:border-color .18s,box-shadow .18s,background .18s;
      font-size:14px;
    }
    input:focus,textarea:focus{
      border-color:var(--blue);
      box-shadow:0 0 0 3px var(--blue-light);
      background:var(--card);
    }
    input::placeholder,textarea::placeholder{color:var(--muted);opacity:.7}

    /* ===== LAYOUT ===== */
    .app{max-width:480px;min-height:100vh;margin:auto;background:var(--bg);position:relative;overflow-x:hidden}
    .page{padding:14px 14px 104px;overflow-x:hidden}

    /* ===== HEADER / TOP BAR ===== */
    .top{
      position:sticky;top:0;z-index:10;
      background:var(--card);
      margin:-14px -14px 14px;
      padding:11px 14px;
      border-bottom:1px solid var(--line);
      display:flex;align-items:center;justify-content:space-between;gap:8px;
      min-width:0;
      box-shadow:0 1px 0 var(--line),0 2px 16px rgba(20,40,80,.05);
    }
    [data-theme="dark"] .top{box-shadow:0 1px 0 var(--line),0 4px 20px rgba(0,0,0,.2)}
    .brand{min-width:0;flex:1}
    .title{
      font-size:15px;font-weight:800;letter-spacing:-.02em;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      color:var(--text);
    }
    .sub{
      font-size:11px;color:var(--muted);margin-top:1px;
      line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .row{display:flex;align-items:center;gap:6px;flex-wrap:nowrap;justify-content:flex-end;flex-shrink:0}
    .between{display:flex;align-items:center;justify-content:space-between;gap:10px}

    /* ===== GRID ===== */
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .grid2>*{min-width:0;max-width:100%}

    /* ===== CARDS ===== */
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:16px;
      box-shadow:var(--shadow);
    }

    /* ===== HERO CARD ===== */
    .hero{
      background:linear-gradient(145deg,var(--hero1) 0%,var(--hero2) 100%);
      color:#fff;
      border-radius:var(--radius-lg);
      padding:0;
      box-shadow:var(--shadow-md);
      position:relative;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    /* Dekorasi lingkaran latar */
    .hero::before{
      content:"";position:absolute;
      right:-40px;top:-40px;
      width:160px;height:160px;
      border-radius:50%;
      background:rgba(255,255,255,.07);
      pointer-events:none;
    }
    .hero::after{
      content:"";position:absolute;
      left:-24px;bottom:-24px;
      width:110px;height:110px;
      border-radius:50%;
      background:rgba(255,255,255,.05);
      pointer-events:none;
    }
    /* Bagian atas: label + nominal */
    .hero-body{
      position:relative;
      padding:18px 18px 14px;
    }
    .hero .kicker{
      font-size:10px;line-height:1;
      margin:0 0 6px;
      opacity:.78;
      text-transform:uppercase;
      letter-spacing:.1em;
      font-weight:700;
    }
    .hero .big{
      font-size:30px;
      margin:0;
      line-height:1.05;
      font-weight:800;
      letter-spacing:-.02em;
      font-variant-numeric:tabular-nums;
    }
    /* Meta baris tanggal & jumlah trx */
    .hero-meta-line{
      display:inline-flex;
      align-items:center;
      gap:6px;
      margin-top:8px;
      font-size:11px;
      line-height:1;
      opacity:.78;
      font-weight:600;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:100%;
    }
    .hero-meta-line::before{
      content:"";
      display:inline-block;
      width:4px;height:4px;
      border-radius:50%;
      background:rgba(255,255,255,.6);
      flex-shrink:0;
    }
    .hero .sub{
      color:rgba(255,255,255,.72);
      font-size:11px;
      margin-top:0;
      line-height:1.3;
    }
    /* Garis pemisah tipis sebelum sync */
    .hero-divider{
      height:1px;
      background:rgba(255,255,255,.14);
      margin:0 18px;
      position:relative;
    }

    /* ===== TYPOGRAPHY ATOMS ===== */
    .kicker{font-size:10px;text-transform:uppercase;letter-spacing:.09em;font-weight:700;color:var(--muted)}
    .big{font-size:28px;font-weight:800;letter-spacing:-.03em;margin-top:4px;font-variant-numeric:tabular-nums}

    /* ===== STAT CARDS ===== */
    .stat{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:14px 13px;
      min-height:82px;
      box-shadow:var(--shadow);
    }
    .stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;line-height:1.2}
    .stat-val{font-size:20px;font-weight:800;margin-top:6px;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
    .stat-foot{font-size:11px;color:var(--muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* ===== BUTTONS ===== */
    .btn{
      min-height:42px;
      border-radius:var(--radius-sm);
      padding:10px 16px;
      background:var(--card);
      border:1.5px solid var(--line);
      color:var(--text);
      font-weight:700;
      font-size:13px;
      display:inline-flex;align-items:center;justify-content:center;gap:7px;
      text-decoration:none;
      transition:transform .12s,box-shadow .12s,background .15s,opacity .12s,border-color .15s;
      letter-spacing:-.01em;
      line-height:1;
    }
    .btn:active{transform:scale(.96);opacity:.88}
    .primary{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 4px 16px rgba(59,110,240,.28)}
    .primary:active{box-shadow:0 2px 6px rgba(59,110,240,.18)}
    .danger{background:var(--red-light);border-color:var(--red-mid);color:var(--red)}
    .success{background:var(--green-light);border-color:var(--green-mid);color:var(--green)}
    .warn{background:var(--amber-light);border-color:var(--amber-mid);color:var(--amber)}
    .block{width:100%}
    .sm{min-height:32px;border-radius:9px;padding:5px 10px;font-size:12px}

    /* ===== PILLS / BADGES ===== */
    .pill{
      display:inline-flex;align-items:center;
      border:1px solid var(--line);
      border-radius:999px;
      padding:3px 10px;
      font-size:10.5px;font-weight:700;
      color:var(--muted);background:var(--card);
      white-space:nowrap;
      letter-spacing:.01em;
    }
    .pill.green{background:var(--green-light);color:var(--green);border-color:var(--green-mid)}
    .pill.red{background:var(--red-light);color:var(--red);border-color:var(--red-mid)}
    .pill.blue{background:var(--blue-light);color:var(--blue);border-color:var(--blue-mid)}
    .pill.amber{background:var(--amber-light);color:var(--amber);border-color:var(--amber-mid)}

    /* ===== LIST / ITEM ===== */
    .list{display:flex;flex-direction:column;gap:8px}
    .item{
      background:var(--card);border:1px solid var(--line);
      border-radius:var(--radius);padding:13px 14px;
      display:flex;gap:11px;align-items:center;
      box-shadow:var(--shadow);
    }
    .main{min-width:0;flex:1}
    .item-title{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-sub{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.35}
    .amount{font-weight:800;font-size:13px;text-align:right;font-variant-numeric:tabular-nums}
    .icon{
      width:38px;height:38px;border-radius:12px;
      border:1px solid var(--line);
      background:var(--card2);
      color:var(--text);font-weight:800;
      display:inline-flex;align-items:center;justify-content:center;
      flex-shrink:0;font-size:16px;
    }

    /* ===== FORM FIELDS ===== */
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
    .label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:700}
    .hint{font-size:12px;color:var(--muted);line-height:1.5}
    .empty{
      padding:24px 16px;
      border:1.5px dashed var(--line2);
      border-radius:var(--radius);
      text-align:center;color:var(--muted);
      font-size:12.5px;background:var(--soft);
      line-height:1.5;
    }

    /* ===== BOTTOM NAV ===== */
    .nav{
      position:fixed;left:50%;bottom:calc(12px + var(--safe));
      transform:translateX(-50%);
      width:min(460px,calc(100% - 16px));
      height:64px;
      background:var(--nav);
      border:1px solid var(--line);
      box-shadow:var(--shadow-md);
      border-radius:22px;
      display:none;z-index:20;padding:6px;
    }
    .nav button{
      flex:1;border-radius:16px;background:transparent;
      color:var(--muted);font-size:10.5px;font-weight:700;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
      transition:background .15s,color .15s;
    }
    .nav button.active{background:var(--blue-light);color:var(--blue)}
    [data-theme="dark"] .nav button.active{background:rgba(91,140,245,.15);color:var(--blue)}
    .nav svg{width:20px;height:20px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}

    /* ===== FABs ===== */
    .fab{
      position:fixed;
      right:max(16px,calc((100% - 480px)/2 + 16px));
      bottom:calc(88px + var(--safe));
      width:56px;height:56px;
      border-radius:18px;
      background:var(--blue);color:#fff;
      font-size:28px;
      box-shadow:0 8px 28px rgba(59,110,240,.38);
      display:none;z-index:22;
      transition:transform .12s,box-shadow .12s;
      align-items:center;justify-content:center;line-height:1;
    }
    .fab:active{transform:scale(.95);box-shadow:0 4px 14px rgba(59,110,240,.28)}
    .absen-fab{
      position:fixed;
      right:max(16px,calc((100% - 480px)/2 + 16px));
      bottom:calc(156px + var(--safe));
      width:56px;height:56px;
      border-radius:18px;
      background:var(--green);color:#fff;font-weight:800;
      box-shadow:0 8px 28px rgba(22,163,74,.36);
      display:none;z-index:23;
      align-items:center;justify-content:center;flex-direction:column;
      gap:2px;padding:6px 4px 5px;line-height:1;
      transition:transform .12s,box-shadow .12s;
    }
    .absen-fab span{display:block;font-size:9.5px;font-weight:800;letter-spacing:-.02em;line-height:1}
    .absen-fab svg{width:24px;height:24px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
    .absen-fab:active{transform:scale(.96)}

    /* ===== MODAL ===== */
    .modal-wrap{
      position:fixed;inset:0;
      background:rgba(10,18,34,.6);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      z-index:40;display:none;
      align-items:flex-start;justify-content:center;
      padding:72px 14px 14px;
    }
    .modal-wrap.show{display:flex}
    .modal{
      width:100%;max-width:440px;max-height:88vh;overflow:auto;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius-xl);
      padding:20px;
      box-shadow:var(--shadow-lg);
      animation:modalPop .2s cubic-bezier(.2,1,.3,1);
    }
    .modal.tx-modal{
      max-width:400px;max-height:76vh;
      border:1px solid var(--blue-mid);
      border-radius:var(--radius-xl);
      padding:12px;
      box-shadow:var(--shadow-lg);
    }
    .modal.tx-modal::before{
      content:"";display:block;
      width:36px;height:4px;border-radius:999px;
      background:var(--line2);margin:2px auto 10px;
    }
    .modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:14px}
    .modal.tx-modal .modal-head{
      align-items:center;
      background:linear-gradient(135deg,var(--hero1),var(--hero2));
      color:#fff;
      margin:-2px -2px 12px;padding:13px 14px;
      border-radius:calc(var(--radius-xl) - 4px) calc(var(--radius-xl) - 4px) var(--radius) var(--radius);
      box-shadow:0 6px 20px rgba(35,86,204,.26);
    }
    .modal-title{font-size:17px;font-weight:800;letter-spacing:-.02em}
    .modal.tx-modal .modal-title{font-size:15.5px;letter-spacing:-.02em}
    .modal.tx-modal .icon{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.3);color:#fff;width:32px;height:32px;border-radius:11px}
    .modal-actions{display:flex;gap:8px;margin-top:14px}
    .modal-actions>*{flex:1}
    .modal.tx-modal .modal-actions{
      position:sticky;bottom:-12px;
      background:linear-gradient(180deg,rgba(255,255,255,0),var(--card) 28%);
      padding-top:14px;padding-bottom:4px;
    }
    [data-theme="dark"] .modal.tx-modal .modal-actions{background:linear-gradient(180deg,rgba(26,36,56,0),var(--card) 28%)}
    .modal.tx-modal .btn{min-height:42px;border-radius:13px}
    .modal.tx-modal .field{margin-bottom:10px}
    .modal.tx-modal input{min-height:42px;border-radius:13px}

    /* ===== TX CHIP ===== */
    .tx-chip{
      display:flex;align-items:center;justify-content:space-between;gap:8px;
      margin-bottom:10px;padding:9px 13px;
      border-radius:var(--radius-sm);
      background:var(--blue-light);border:1px solid var(--blue-mid);
      color:var(--blue);font-size:11px;font-weight:700;
    }
    [data-theme="dark"] .tx-chip{background:rgba(91,140,245,.13);border-color:rgba(91,140,245,.25);color:var(--blue)}
    .tx-chip span{white-space:nowrap}
    .tx-chip b{font-variant-numeric:tabular-nums}
    .tx-amount-input{letter-spacing:-.04em}
    .tx-note-mini{
      font-size:11.5px;color:var(--muted);line-height:1.45;
      padding:9px 12px;border-radius:11px;
      background:var(--soft);border:1.5px dashed var(--line2);
    }

    /* ===== ANIMATIONS ===== */
    @keyframes modalPop{from{transform:scale(.94) translateY(16px);opacity:.15}to{transform:scale(1) translateY(0);opacity:1}}

    /* ===== TOAST ===== */
    .toast{
      position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:80;
      background:var(--text);color:var(--bg);
      border-radius:999px;padding:11px 20px;
      font-weight:700;font-size:12.5px;
      display:none;max-width:calc(100% - 28px);text-align:center;
      box-shadow:var(--shadow-md);
      letter-spacing:-.01em;
    }
    .toast.show{display:block}

    /* ===== LOADING OVERLAY ===== */
    .loading{position:fixed;inset:0;z-index:60;background:rgba(245,247,252,.65);display:none;align-items:center;justify-content:center}
    [data-theme="dark"] .loading{background:rgba(15,22,35,.6)}
    .spin{
      width:38px;height:38px;border-radius:50%;
      border:3px solid var(--line2);border-top-color:var(--blue);
      animation:spin .7s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ===== LOGIN PAGE ===== */
    .login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 18px}
    .login-card{width:100%;max-width:380px;display:flex;flex-direction:column;gap:14px}

    /* ===== MISC ===== */
    .member{color:var(--blue)}
    .bonus-note{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.4}
    .bonus-refresh-note{
      display:flex;align-items:center;gap:10px;
      font-size:11px;color:var(--amber);
      line-height:1.5;margin:6px 0 0;
      padding:11px 13px;border-radius:var(--radius-sm);
      background:var(--amber-light);border:1px solid var(--amber-mid);
    }
    .note-alert-icon{
      width:22px;height:22px;min-width:22px;
      border-radius:999px;display:inline-flex;align-items:center;justify-content:center;
      background:var(--amber);color:#fff;
      font-size:13px;font-weight:800;line-height:1;
    }

    /* ===== MANUAL BONUS ALERT ===== */
    .manual-bonus-alert{
      margin-bottom:10px;border-color:var(--green-mid);
      background:linear-gradient(135deg,var(--green-light),var(--card));
      position:relative;overflow:hidden;
    }
    .manual-bonus-alert::before{
      content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--green);border-radius:4px 0 0 4px;
    }
    .manual-bonus-alert .manual-bonus-ico{
      width:38px;height:38px;border-radius:12px;
      background:var(--green);color:#fff;
      display:inline-flex;align-items:center;justify-content:center;
      font-size:18px;font-weight:800;flex-shrink:0;
    }
    .manual-bonus-alert .stat-val{color:var(--green);font-size:20px;margin-top:3px}
    .manual-bonus-alert .btn{min-height:32px;border-radius:10px;font-size:12px;padding:5px 10px}
    [data-theme="dark"] .manual-bonus-alert{background:linear-gradient(135deg,var(--green-light),var(--card));border-color:var(--green-mid)}

    /* ===== ROLE CARDS ===== */
    .role-card{margin-bottom:10px;border-radius:var(--radius);padding:13px 15px;border:1px solid var(--line);background:var(--card);box-shadow:var(--shadow)}
    .role-card.staff{border-color:var(--green-mid);background:linear-gradient(135deg,var(--green-light),var(--card))}
    .role-card.daily{border-color:var(--blue-mid);background:linear-gradient(135deg,var(--blue-light),var(--card))}
    [data-theme="dark"] .role-card.staff{background:linear-gradient(135deg,var(--green-light),var(--card));border-color:var(--green-mid)}
    [data-theme="dark"] .role-card.daily{background:linear-gradient(135deg,var(--blue-light),var(--card));border-color:var(--blue-mid)}
    .role-title{font-size:13px;font-weight:800}
    .lock-status{display:inline-flex;align-items:center;gap:7px}
    .lock-status .lock-ico{
      width:28px;height:28px;border-radius:9px;
      display:inline-flex;align-items:center;justify-content:center;
      font-size:14px;font-weight:800;
    }
    .lock-status.open .lock-ico{background:var(--green-light);color:var(--green);border:1px solid var(--green-mid)}
    .lock-status.locked .lock-ico{background:var(--red-light);color:var(--red);border:1px solid var(--red-mid)}
    .trx-head-status{
      min-height:28px;border-radius:9px;padding:4px 8px;
      border:1px solid var(--line);background:var(--card);
      display:inline-flex;align-items:center;gap:5px;
      font-size:10.5px;font-weight:700;white-space:nowrap;
    }
    .trx-head-status .lock-ico{width:18px;height:18px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:11px}
    .trx-head-status.open{color:var(--green);border-color:var(--green-mid);background:var(--green-light)}
    .trx-head-status.locked{color:var(--red);border-color:var(--red-mid);background:var(--red-light)}
    .role-desc{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.45}
    .closing-bonus-card{margin-bottom:10px;border-color:var(--green-mid);background:linear-gradient(135deg,var(--green-light),var(--card))}
    [data-theme="dark"] .closing-bonus-card{background:linear-gradient(135deg,var(--green-light),var(--card));border-color:var(--green-mid)}

    /* ===== SYNC BAR ===== */
    .syncbar{
      margin-bottom:10px;padding:10px 13px;
      border:1px solid var(--line);border-radius:var(--radius-sm);
      background:var(--card);
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      color:var(--muted);font-size:11.5px;
      box-shadow:var(--shadow);
    }
    .syncbar b{color:var(--text)}
    .syncbar .btn{min-height:28px;padding:5px 10px;font-size:11px;border-radius:8px}
    .hero-sync{
      display:flex;align-items:center;justify-content:space-between;gap:8px;
      padding:10px 18px 14px;
      color:rgba(255,255,255,.82);font-size:11px;line-height:1.3;
      position:relative;
    }
    .hero-sync b{color:#fff;font-weight:700}
    .hero-sync-btn{
      min-height:28px;border-radius:9px;padding:5px 12px;
      background:rgba(255,255,255,.16);
      border:1px solid rgba(255,255,255,.24);
      color:#fff;font-size:10.5px;font-weight:700;
      transition:background .14s,transform .1s;
      white-space:nowrap;flex-shrink:0;
    }
    .hero-sync-btn:active{transform:scale(.95);background:rgba(255,255,255,.24)}
    .hero-sync-error{margin-top:3px;color:#fecaca;font-size:10.5px}
    .sync-pending{border-color:var(--amber-mid);background:var(--amber-light);color:var(--amber)}
    .pending-tag{
      display:inline-flex;margin-top:4px;border-radius:999px;
      padding:2px 8px;background:var(--amber-light);
      color:var(--amber);font-size:10px;font-weight:700;
      border:1px solid var(--amber-mid);
    }
    .fail-tag{
      display:inline-flex;margin-top:4px;border-radius:999px;
      padding:2px 8px;background:var(--red-light);
      color:var(--red);font-size:10px;font-weight:700;
      border:1px solid var(--red-mid);
    }

    /* ===== ATT STATUS CARDS ===== */
    .att-status{position:relative;overflow:hidden}
    .att-status .stat-label,.att-status .stat-foot{color:inherit;opacity:.8}
    .att-status .stat-val{color:inherit}
    .att-status.ok{background:var(--green-light);border-color:var(--green-mid);color:var(--green)}
    .att-status.wait{background:var(--red-light);border-color:var(--red-mid);color:var(--red)}
    .att-status.closed{background:var(--amber-light);border-color:var(--amber-mid);color:var(--amber)}

    /* ===== BONUS PLUS CARD ===== */
    .bonus-plus-card{position:relative;padding-right:62px}
    .bonus-plus-head{display:block;margin-bottom:4px}
    .refresh-icon-btn{
      position:absolute;right:14px;top:50%;transform:translateY(-50%);
      width:38px;height:38px;border-radius:12px;
      border:1px solid var(--blue-mid);background:var(--blue-light);
      color:var(--blue);
      display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;
      transition:transform .12s;
    }
    .refresh-icon-btn:active{transform:translateY(-50%) scale(.94)}
    .refresh-icon-btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:2.3;fill:none;stroke-linecap:round;stroke-linejoin:round}

    /* ===== AVG ATTENDANCE CARD ===== */
    .avg-att-card{
      margin:14px 0 16px;
      border-color:var(--blue-mid);
      background:linear-gradient(135deg,var(--blue-light),var(--card));
      overflow:hidden;
    }
    .avg-att-card .between{
      display:grid;
      grid-template-columns:minmax(0,1fr) max-content;
      gap:10px;align-items:center;width:100%;
    }
    .avg-att-head{display:flex;align-items:center;gap:10px;min-width:0;max-width:100%;overflow:hidden}
    .avg-att-head>div{min-width:0;overflow:hidden}
    .avg-att-head .label,.avg-att-head .hint{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .avg-att-ico{
      width:40px;height:40px;min-width:40px;
      border-radius:13px;border:1px solid var(--blue-mid);
      background:var(--blue-light);color:var(--blue);
      display:inline-flex;align-items:center;justify-content:center;
      font-size:18px;font-weight:800;
    }
    .avg-att-metric{
      min-width:96px;max-width:112px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;gap:5px;
      flex-shrink:0;overflow:visible;
    }
    .avg-att-metric .stat-val{margin:0;line-height:1.05;letter-spacing:-.03em;white-space:nowrap;max-width:100%;overflow:visible}
    .avg-att-metric .pill{justify-content:center;max-width:none;width:auto;overflow:visible;text-overflow:clip;white-space:nowrap;line-height:1.2;padding:3px 8px;font-size:9px}
    .avg-good{border-color:var(--green-mid);background:linear-gradient(135deg,var(--green-light),var(--card))}
    .avg-warn{border-color:var(--amber-mid);background:linear-gradient(135deg,var(--amber-light),var(--card))}
    .avg-good .stat-val{color:var(--green)}
    .avg-warn .stat-val{color:var(--amber)}
    [data-theme="dark"] .avg-att-card{background:linear-gradient(135deg,var(--blue-light),var(--card));border-color:var(--blue-mid)}
    [data-theme="dark"] .avg-good{background:linear-gradient(135deg,var(--green-light),var(--card));border-color:var(--green-mid)}
    [data-theme="dark"] .avg-warn{background:linear-gradient(135deg,var(--amber-light),var(--card));border-color:var(--amber-mid)}

    /* ===== TX TABLE ===== */
    .tx-table{display:flex;flex-direction:column;gap:8px;width:100%;overflow:hidden}
    .tx-head,.tx-row{display:grid;grid-template-columns:minmax(0,1fr) 96px 90px;align-items:center;gap:7px;width:100%;min-width:0}
    .tx-head{padding:0 5px 5px;color:var(--muted);font-size:10px;text-transform:uppercase;font-weight:700;letter-spacing:.05em}
    .tx-head span:nth-child(2),.tx-nominal{text-align:right}
    .tx-head span:nth-child(3),.tx-action{text-align:right}
    .tx-row{
      background:var(--card);border:1px solid var(--line);
      border-radius:var(--radius);
      padding:12px 10px 12px 14px;
      box-shadow:var(--shadow);
      min-width:0;
    }
    .tx-title{font-weight:700;font-size:13px;line-height:1.3;white-space:pre-wrap!important;overflow:visible!important;text-overflow:clip!important;word-break:break-word;min-width:0}
    .tx-meta{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.3}
    .tx-nominal{font-weight:800;font-size:13px;font-variant-numeric:tabular-nums;white-space:nowrap;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis}
    .tx-action{min-width:0}
    .tx-action-buttons{display:flex;gap:5px;justify-content:flex-end;align-items:center;min-width:0}
    .tx-del-btn,.tx-print-btn{min-height:30px;padding:4px 8px;font-size:11px;border-radius:9px}
    .tx-print-btn{
      min-width:32px;font-size:0!important;
      display:inline-flex!important;align-items:center!important;justify-content:center!important;
    }
    .tx-print-btn::before{content:"🖨️";font-size:14px!important;line-height:1!important}
    .tx-action .pill{padding:3px 8px;font-size:9.5px}

    /* ===== FIRST TX PARTY ===== */
    .first-tx-party{position:fixed;inset:0;z-index:95;display:flex;align-items:center;justify-content:center;background:rgba(13,20,34,.25);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);pointer-events:auto;opacity:0;transition:opacity .2s ease;padding:18px}
    .first-tx-party.show{opacity:1}
    .first-tx-box{position:relative;width:min(340px,calc(100% - 28px));border-radius:28px;padding:20px 18px 18px;text-align:center;color:#fff;background:linear-gradient(135deg,#2a5bd7,#22c55e);box-shadow:0 24px 72px rgba(13,20,34,.4);overflow:hidden;animation:firstTxPop .34s cubic-bezier(.2,1.2,.3,1)}
    .first-tx-box::before{content:"";position:absolute;inset:-40%;background:radial-gradient(circle,rgba(255,255,255,.4),transparent 58%);animation:firstTxGlow 1.7s ease-in-out infinite}
    .first-tx-emoji{position:relative;font-size:44px;line-height:1;animation:firstTxBounce .8s ease-in-out infinite}
    .first-tx-title{position:relative;font-size:19px;font-weight:800;letter-spacing:-.03em;margin-top:6px}
    .first-tx-sub{position:relative;font-size:12.5px;opacity:.9;margin-top:4px;line-height:1.4;white-space:pre-wrap;word-break:break-word}
    .first-tx-amount{position:relative;font-size:27px;font-weight:800;margin-top:9px;font-variant-numeric:tabular-nums}
    .first-tx-close{position:relative;margin-top:13px;min-height:40px;border-radius:14px;padding:8px 18px;background:rgba(255,255,255,.92);color:#166534;border:1px solid rgba(255,255,255,.78);font-weight:800;box-shadow:0 10px 24px rgba(13,20,34,.18)}
    .first-tx-close:active{transform:scale(.97)}
    .first-tx-confetti i{position:absolute;left:50%;top:50%;width:7px;height:12px;border-radius:3px;background:#fff;opacity:0;animation:firstTxFly .95s ease-out forwards;animation-delay:var(--d)}
    .first-tx-confetti i:nth-child(3n){background:#fde047}
    .first-tx-confetti i:nth-child(3n+1){background:#86efac}
    .first-tx-confetti i:nth-child(3n+2){background:#bfdbfe}
    @keyframes firstTxPop{from{transform:scale(.72) translateY(18px);opacity:.25}to{transform:scale(1) translateY(0);opacity:1}}
    @keyframes firstTxGlow{0%,100%{transform:translate(-12%,-8%) rotate(0deg)}50%{transform:translate(12%,8%) rotate(18deg)}}
    @keyframes firstTxBounce{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-6px) rotate(4deg)}}
    @keyframes firstTxFly{0%{transform:translate(-50%,-50%) scale(.6) rotate(0deg);opacity:1}100%{transform:translate(var(--x),var(--y)) scale(1) rotate(var(--r));opacity:0}}
    @media(prefers-reduced-motion:reduce){.first-tx-box,.first-tx-emoji,.first-tx-box::before,.first-tx-confetti i{animation:none}.first-tx-party.show{opacity:1}}

    /* ===== MANUAL BONUS PARTY ===== */
    .manual-bonus-party{position:fixed;inset:0;z-index:96;display:flex;align-items:center;justify-content:center;background:rgba(13,20,34,.28);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);pointer-events:auto;opacity:0;transition:opacity .2s ease;padding:18px}
    .manual-bonus-party.show{opacity:1}
    .manual-bonus-box{position:relative;width:min(340px,calc(100% - 28px));border-radius:28px;padding:20px 18px 18px;text-align:center;color:#fff;background:linear-gradient(135deg,#18a85a,#f59e0b);box-shadow:0 24px 72px rgba(13,20,34,.42);overflow:hidden;animation:firstTxPop .34s cubic-bezier(.2,1.2,.3,1)}
    .manual-bonus-box::before{content:"";position:absolute;inset:-40%;background:radial-gradient(circle,rgba(255,255,255,.4),transparent 58%);animation:firstTxGlow 1.7s ease-in-out infinite}
    .manual-bonus-emoji{position:relative;font-size:46px;line-height:1;animation:firstTxBounce .8s ease-in-out infinite}
    .manual-bonus-title{position:relative;font-size:19px;font-weight:800;letter-spacing:-.03em;margin-top:6px}
    .manual-bonus-sub{position:relative;font-size:12.5px;opacity:.92;margin-top:4px;line-height:1.4}
    .manual-bonus-note{position:relative;font-size:15.5px;font-weight:800;opacity:.96;margin-top:7px;line-height:1.4}
    .manual-bonus-amount{position:relative;font-size:28px;font-weight:800;margin-top:9px;font-variant-numeric:tabular-nums}
    .manual-bonus-count{position:relative;display:inline-flex;margin-top:9px;border-radius:999px;padding:4px 10px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);font-size:11px;font-weight:700}
    .manual-bonus-close{position:relative;margin-top:13px;min-height:40px;border-radius:14px;padding:8px 18px;background:rgba(255,255,255,.92);color:#166534;border:1px solid rgba(255,255,255,.78);font-weight:800;box-shadow:0 10px 24px rgba(13,20,34,.18)}
    .manual-bonus-close:active{transform:scale(.97)}
    .manual-bonus-confetti i{position:absolute;left:50%;top:50%;width:7px;height:12px;border-radius:3px;background:#fff;opacity:0;animation:firstTxFly .95s ease-out forwards;animation-delay:var(--d)}
    .manual-bonus-confetti i:nth-child(3n){background:#fde047}
    .manual-bonus-confetti i:nth-child(3n+1){background:#86efac}
    .manual-bonus-confetti i:nth-child(3n+2){background:#bbf7d0}
    @media(prefers-reduced-motion:reduce){.manual-bonus-box,.manual-bonus-emoji,.manual-bonus-box::before,.manual-bonus-confetti i{animation:none}.manual-bonus-party.show{opacity:1}}

    /* ===== HEADER GUIDE CARD ===== */
    .header-guide-card{margin:10px 0;background:linear-gradient(135deg,var(--soft),var(--card));overflow:hidden}
    .header-guide-bonus-quote{margin-top:5px;font-size:11.5px;line-height:1.55;font-weight:700;color:var(--text);letter-spacing:.01em}
    .header-guide-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .header-guide-item{display:flex;align-items:flex-start;gap:8px;border:1px solid var(--line);border-radius:12px;background:var(--soft);padding:10px;min-width:0}
    .header-guide-ico{width:32px;height:32px;min-width:32px;border-radius:10px;border:1px solid var(--line);background:var(--card);display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--blue)}
    .header-guide-title{font-size:11.5px;font-weight:800;line-height:1.2;color:var(--text)}
    .header-guide-desc{font-size:10.5px;color:var(--muted);line-height:1.35;margin-top:3px}
    [data-theme="dark"] .header-guide-card{background:linear-gradient(135deg,rgba(91,140,245,.07),var(--card))}
    @media(max-width:360px){.header-guide-grid{grid-template-columns:1fr}.header-guide-card{padding:12px}.header-guide-bonus-quote{font-size:11px;line-height:1.48}.header-guide-item{padding:9px}.header-guide-desc{font-size:10px}}
    .header-guide-card.is-compact{padding:10px 13px;margin:8px 0;background:linear-gradient(135deg,var(--blue-light),var(--card));border-color:var(--blue-mid)}
    .header-guide-open-btn{min-height:34px;border-radius:10px;padding:6px 11px;background:var(--blue-light);border:1px solid var(--blue-mid);color:var(--blue);font-size:11.5px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap}
    .header-guide-open-btn:active{transform:scale(.97)}
    .header-guide-mini-row{display:flex;align-items:center;gap:9px;min-width:0;flex:1}
    .header-guide-mini-ico{width:32px;height:32px;min-width:32px;border-radius:11px;background:var(--blue-light);border:1px solid var(--blue-mid);color:var(--blue);display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:800}
    .header-guide-modal-note{margin-bottom:10px;padding:10px 13px;border-radius:12px;border:1px solid var(--green-mid);background:var(--green-light);color:var(--text);font-size:11.5px;line-height:1.5;font-weight:700}
    [data-theme="dark"] .header-guide-card.is-compact{background:linear-gradient(135deg,var(--blue-light),var(--card));border-color:var(--blue-mid)}
    [data-theme="dark"] .header-guide-open-btn,[data-theme="dark"] .header-guide-mini-ico{background:var(--blue-light);border-color:var(--blue-mid);color:var(--blue)}
    [data-theme="dark"] .header-guide-modal-note{background:var(--green-light);border-color:var(--green-mid)}
    @media(max-width:360px){.header-guide-card.is-compact{padding:9px 11px}.header-guide-open-btn{font-size:11px;padding:6px 9px}.header-guide-mini-ico{width:28px;height:28px;min-width:28px}.header-guide-card.is-compact .hint{font-size:10.5px}}

    /* ===== STAFF HOME NOTE ===== */
    .staff-home-note-card{margin:8px 0 0;padding:12px 14px;border-color:var(--blue-mid);background:linear-gradient(135deg,var(--blue-light),var(--card));overflow:visible}
    .staff-home-note-main{display:flex;align-items:flex-start;gap:10px;min-width:0}
    .staff-home-note-ico{width:34px;height:34px;min-width:34px;border-radius:11px;background:var(--blue-light);border:1px solid var(--blue-mid);color:var(--blue);display:inline-flex;align-items:center;justify-content:center;align-self:flex-start;line-height:1;font-size:15px;font-weight:800;margin-top:1px}
    .staff-home-note-title{font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:800;color:var(--blue);line-height:1.1}
    .staff-home-note-text{font-size:12px;line-height:1.55;color:var(--text);font-weight:600;margin-top:4px;display:block;max-height:none;overflow:visible;white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere}
    .staff-note-link{color:var(--blue);font-weight:800;text-decoration:underline;text-underline-offset:3px;word-break:normal;overflow-wrap:anywhere}
    .staff-note-link::after{content:'↗';font-size:9px;margin-left:3px;text-decoration:none;display:inline-block}
    .staff-home-note-meta{font-size:10px;color:var(--muted);font-weight:700;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    [data-theme="dark"] .staff-home-note-card{background:linear-gradient(135deg,var(--blue-light),var(--card));border-color:var(--blue-mid)}
    [data-theme="dark"] .staff-home-note-ico{background:var(--blue-light);border-color:var(--blue-mid);color:var(--blue)}
    @media(max-width:360px){.staff-home-note-card{padding:10px 12px}.staff-home-note-text{font-size:11.5px;line-height:1.45}.staff-home-note-ico{width:30px;height:30px;min-width:30px;border-radius:10px}}

    /* ===== RECEIPT PREVIEW ===== */
    .receipt-preview-box{margin:9px 0 0;border:1.5px dashed var(--line2);border-radius:var(--radius-sm);background:var(--soft);padding:13px;max-height:50vh;overflow:auto}
    .receipt-preview-text{font-family:ui-monospace,SFMono-Regular,Consolas,'Courier New',monospace;font-size:12px;line-height:1.45;white-space:pre-wrap;color:var(--text)}
    .receipt-preview-note{font-size:11.5px;color:var(--muted);line-height:1.4;margin:9px 0 0}
    .receipt-modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
    .receipt-modal-actions .btn{min-height:42px;border-radius:12px;font-size:12.5px}
    @media(max-width:360px){.receipt-modal-actions{grid-template-columns:1fr}.receipt-preview-text{font-size:11.5px}}

    /* ===== TX PRODUCT INPUT ===== */
    .tx-product-input{width:100%;min-height:96px;border:1.5px solid var(--line);border-radius:13px;background:var(--card2);color:var(--text);padding:12px 14px;outline:none;resize:vertical;font:inherit;font-size:13.5px;line-height:1.45;white-space:pre-wrap;transition:border-color .15s,box-shadow .15s}
    .tx-product-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-light);background:var(--card)}
    .modal.tx-modal textarea.tx-product-input{min-height:96px;border-radius:13px}

    /* ===== MODAL BACKDROP ===== */
    .modal-wrap.tx-backdrop{
      padding:70px 12px 12px;
      align-items:flex-start;justify-content:center;
      overflow-x:hidden;
      background:rgba(10,18,34,.58);
      backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
    }
    .modal.tx-modal{
      width:100%;
      max-width:390px;
      max-height:74vh;
      border:1px solid rgba(91,140,245,.3);
      border-radius:24px;
      padding:12px;
      box-shadow:0 24px 65px rgba(10,18,34,.4),0 0 0 1px rgba(255,255,255,.25);
    }
    .modal.tx-modal::before{
      width:38px;height:4px;border-radius:999px;
      background:var(--line);margin:2px auto 9px;
    }

  const u=key(username||userData?.username||userData?.id), deviceId=getDeviceId(), bound=localDeviceUser();
  if(isDailyUser(userData)){
    try{
      await setDoc(doc(db,'users',u),{
        deviceId:'',
        deviceLocked:false,
        deviceUser:'',
        deviceApp:'staff',
        deviceLabel:'Harian bebas login',
        devicePolicy:'open_any_device',
        deviceLastLoginAt:serverTimestamp(),

      },{merge:true});
    }catch(e){console.warn('daily device free update skipped',e?.code||e)}

  }
  if(bound&&bound!==u){
    const stillOwned=await isLocalDeviceStillOwnedBy(bound,deviceId);
    if(stillOwned)return {ok:false,msg:`Perangkat ini masih terdaftar untuk user ${bound}. Reset device user tersebut dulu dari admin.`};
    clearLocalDeviceUser();
  }
  const serverDeviceId=String(userData?.deviceId||'').trim();
  if(serverDeviceId&&serverDeviceId!==deviceId)return {ok:false,msg:'Akun ini sudah terdaftar di perangkat lain. Hubungi admin untuk reset device.'};
